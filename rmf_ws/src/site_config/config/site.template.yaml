# Template for a Pinky RMF site configuration.
#
# Copy this file to a concrete site file before editing:
#
#   cp src/site_config/config/site.template.yaml \
#      src/site_config/config/<site_name>.site.yaml
#
# Then generate runtime configs:
#
#   python3 src/site_config/site_config/generate_configs.py \
#     --site-config src/site_config/config/<site_name>.site.yaml
#
# The generated files are:
#   - src/pinky_rmf_adapter/config/pinky_adapter.yaml
#   - src/pinky_task_orchestrator/config/task_orchestrator.yaml

site:
  # Unique site/building name. Keep this aligned with the building map name when practical.
  name: example_site

  # RMF level name used by RMF and Pinky drive manager goals.
  # This must match the level names in the building map/nav graph.
  default_map: L1

maps:
  # Add one entry per RMF level.
  L1:
    # Traffic Editor building map source. This is usually edited in Traffic Editor.
    building_map: package://pinky_rmf_maps/maps/example.building.yaml

    # Generated RMF navigation graph for this level/fleet.
    # Treat this as a generated/runtime artifact, not the main hand-edited file.
    nav_graph: package://pinky_rmf_maps/nav_graphs/example.yaml

fleet:
  rmf_fleet:
    # RMF fleet name. This is the fleet name RMF task dispatch will reference.
    name: pinky

    # [max velocity m/s, max acceleration m/s^2]
    # Use conservative values close to the Nav2/controller limits.
    limits:
      linear: [0.2, 0.5]
      angular: [1.0, 2.0]

    # Circular robot model used by RMF traffic planning.
    # footprint: approximate robot body radius.
    # vicinity: extra negotiation/avoidance radius.
    profile:
      footprint: 0.12
      vicinity: 0.35

    # Set true only if the robot can safely drive backwards as part of RMF plans.
    reversible: false

    # Battery and power model used by RMF task planning.
    # MVP can use approximate values; refine once measured.
    battery_system:
      voltage: 7.4
      capacity: 2.0
      charging_current: 1.0
    mechanical_system:
      mass: 2.0
      moment_of_inertia: 1.0
      friction_coefficient: 0.22
    ambient_system:
      power: 5.0
    tool_system:
      power: 0.0

    recharge_threshold: 0.10
    recharge_soc: 1.0
    account_for_battery_drain: false

    # Fleet state publish frequency. Keep this aligned with robot state update frequency.
    publish_fleet_state: 10.0
    robot_state_update_frequency: 10.0

    # RMF task types this fleet supports.
    task_capabilities:
      loop: true
      delivery: false

    # One of: park, charge, nothing.
    finishing_request: park

    # Enable RMF responsive wait behavior for idle robots.
    responsive_wait: true

    # Tolerances used when merging robot pose into the RMF nav graph.
    max_merge_waypoint_distance: 0.02
    max_merge_lane_distance: 0.02

  fleet_manager:
    # These fields exist because the upstream fleet_adapter_template expects
    # HTTP-style API settings. Keep them empty until RobotClientAPI no longer
    # requires them, or replace them if a real fleet API server is introduced.
    prefix: ""
    user: ""
    password: ""

    # Defaults for every robot's Pinky drive API.
    robot_defaults:
      navigate_action: navigate
      stop_service: stop
      state_topic: state
      state_timeout: 2.0
      action_server_timeout: 2.0
      stop_service_timeout: 2.0
      goal_acceptance_timeout: 5.0

  robots:
    # Add one entry per Pinky robot in this fleet.
    pinky1:
      # RMF level where this robot starts/operates by default.
      rmf_level: L1

      # Charger waypoint name. Must exist in the nav graph.
      charger: start

      # Any extra robot properties that RMF FleetConfiguration supports under
      # rmf_fleet.robots.<robot_name> are preserved in generated
      # pinky_adapter.yaml. For example:
      #
      # responsive_wait: false

      # Public drive API namespace provided by pinky_drive_manager.
      # Expected interfaces:
      #   /<robot>/drive/state
      #   /<robot>/drive/navigate
      #   /<robot>/drive/stop
      drive_namespace: /pinky1/drive

      # Optional per-robot override for robot_defaults.
      # drive_api:
      #   state_timeout: 3.0

locations:
  # Named application locations used by task_orchestrator workflows.
  # waypoint must match a named waypoint in the RMF nav graph.
  start:
    map: L1
    waypoint: start
  pickup:
    map: L1
    waypoint: pickup
  dropoff:
    map: L1
    waypoint: dropoff

workflows:
  # Application-level workflow definitions. These are not RMF public states;
  # they describe service flow states owned by pinky_task_orchestrator.
  delivery_support:
    states:
      - idle
      - called
      - dispatching_to_pickup
      - moving_to_pickup
      - waiting_for_load
      - dispatching_to_dropoff
      - moving_to_dropoff
      - waiting_for_unload
      - returning
      - completed
      - blocked
      - canceled

    # TODO: Fill these once pickup/dropoff policy is decided.
    # pickup_locations: [pickup]
    # dropoff_locations: [dropoff]

rmf_task_dispatch:
  # TODO: Fill this after choosing the RMF task submission API/topic/service for Jazzy.
  # Examples might become a ROS 2 service, action, or websocket endpoint depending
  # on the RMF deployment style.
  type: todo
  endpoint: ""

reference_coordinates:
  # Coordinate pairs used by fleet_adapter_template to estimate transforms
  # between RMF coordinates and the robot/Nav2 map coordinates.
  #
  # For each pair:
  #   rmf[i]   = coordinate of a known point in Traffic Editor/RMF frame
  #   robot[i] = coordinate of the same physical point in Pinky/Nav2 map frame
  #
  # Use at least 4 well-spread points for a stable transform.
  L1:
    rmf:
      - [0.0, 0.0]
      - [1.0, 0.0]
      - [1.0, 1.0]
      - [0.0, 1.0]
    robot:
      - [0.0, 0.0]
      - [1.0, 0.0]
      - [1.0, 1.0]
      - [0.0, 1.0]
