site:
  name: rmf_test
  default_map: L1

maps:
  L1:
    building_map: package://pinky_rmf_maps/maps/rmf-test.building.yaml
    nav_graph: package://pinky_rmf_maps/nav_graphs/0.yaml

fleet:
  rmf_fleet:
    name: pinky
    limits:
      linear: [0.2, 0.5]
      angular: [1.0, 2.0]
    profile:
      footprint: 0.12
      vicinity: 0.35
    reversible: false
    battery_system:
      voltage: 7.4
      capacity: 2.0
      charging_current: 1.0
    mechanical_system:
      mass: 2.0
      moment_of_inertia: 1.0
      friction_coefficient: 0.22
    ambient_system:
      power: 5.0
    tool_system:
      power: 0.0
    recharge_threshold: 0.10
    recharge_soc: 1.0
    publish_fleet_state: 10.0
    account_for_battery_drain: false
    task_capabilities:
      loop: true
      delivery: false
    finishing_request: park
    responsive_wait: true
    max_merge_waypoint_distance: 0.02
    max_merge_lane_distance: 0.02
    robot_state_update_frequency: 10.0

  fleet_manager:
    # Template RobotAPI placeholders. Remove or replace these when RobotAPI is
    # wired directly to Pinky's ROS 2 drive API.
    prefix: ""
    user: ""
    password: ""
    robot_defaults:
      navigate_action: navigate
      stop_service: stop
      state_topic: state
      state_timeout: 2.0
      action_server_timeout: 2.0
      stop_service_timeout: 2.0
      goal_acceptance_timeout: 5.0

  robots:
    pinky1:
      rmf_level: L1
      charger: start
      drive_namespace: /pinky1/drive
    pinky2:
      rmf_level: L1
      charger: start
      drive_namespace: /pinky2/drive

locations:
  start:
    map: L1
    waypoint: start
  tent_1:
    map: L1
    waypoint: tent_1
  tent_2:
    map: L1
    waypoint: tent_2

workflows:
  delivery_support:
    states:
      - idle
      - called
      - dispatching_to_pickup
      - moving_to_pickup
      - waiting_for_load
      - dispatching_to_dropoff
      - moving_to_dropoff
      - waiting_for_unload
      - returning
      - completed
      - blocked
      - canceled

rmf_task_dispatch:
  # TODO: Fill this after choosing the RMF task submission API/topic/service for Jazzy.
  type: todo
  endpoint: ""

