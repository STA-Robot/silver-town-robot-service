# Generated from site_config/config/rmf_test.site.yaml.
# Edit the site config and rerun `ros2 run site_config generate_configs`.
orchestrator:
  name: pinky_task_orchestrator
  fleet_name: pinky
  default_map: L1

robots:
  - pinky1
  - pinky2

locations:
  start:
    map: L1
    waypoint: start
  tent_1:
    map: L1
    waypoint: tent_1
  tent_2:
    map: L1
    waypoint: tent_2

workflows:
  delivery_support:
    states:
      - idle
      - called
      - dispatching_to_pickup
      - moving_to_pickup
      - waiting_for_load
      - dispatching_to_dropoff
      - moving_to_dropoff
      - waiting_for_unload
      - returning
      - completed
      - blocked
      - canceled

rmf_task_dispatch:
  # TODO: Fill this after choosing the RMF task submission API/topic/service for Jazzy.
  type: todo
  endpoint: ""
