# Pinky RMF adapter runtime config.
# RMF domain topic names are defined under fleet_manager.robots.
rmf_fleet:
  name: pinky
  limits:
    linear: [0.2, 0.5]
    angular: [1.0, 2.0]
  profile:
    footprint: 0.12
    vicinity: 0.35
  reversible: false
  battery_system:
    voltage: 7.4
    capacity: 2.0
    charging_current: 1.0
  mechanical_system:
    mass: 2.0
    moment_of_inertia: 1.0
    friction_coefficient: 0.22
  ambient_system:
    power: 5.0
  tool_system:
    power: 0.0
  recharge_threshold: 0.10
  recharge_soc: 1.0
  publish_fleet_state: 10.0
  account_for_battery_drain: false
  task_capabilities:
    loop: true
    delivery: false
  finishing_request: park
  responsive_wait: true
  max_merge_waypoint_distance: 0.02
  max_merge_lane_distance: 0.02
  robots:
    pinky1:
      charger: start
    pinky2:
      charger: start
  robot_state_update_frequency: 10.0

fleet_manager:
  # RMF domain에서 보이는 topic 이름이다.
  # 각 Pinky local domain의 /command, /state는 domain bridge remap으로
  # /pinky1/command, /pinky1/state처럼 로봇별 topic으로 연결한다.
  prefix: ""
  user: ""
  password: ""
  robots:
    pinky1:
      rmf_level: L1
      command_topic: /pinky1/command
      state_topic: /pinky1/state
      state_timeout: 2.0
      command_accept_timeout: 2.0
      command_finish_timeout: 300.0
    pinky2:
      rmf_level: L1
      command_topic: /pinky2/command
      state_topic: /pinky2/state
      state_timeout: 2.0
      command_accept_timeout: 2.0
      command_finish_timeout: 300.0

reference_coordinates:
  L1:
    rmf:
      - [3.157686640049087, -3.206947422008405] # tent_2
      - [2.971966440416778, -3.099419899179415]
      - [3.0912198426324036, -2.88631916675254]
      - [3.2182904977724522, -2.6576040760359025]
      - [3.4118279503291853, -2.7592485116124914] # tent_1
      - [1.9671069311239384, -2.550076553206912]
      - [2.2036594223240833, -2.6908274009647024]
      - [2.377653742569757, -2.4503662833023454]
      - [2.5164502770964408, -2.219676731795518]
      - [2.2623089668163434, -2.076971570806622] # start
    robot:
      - [1.04756, -0.68246] # tent_2
