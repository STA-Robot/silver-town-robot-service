defaults:
  rmf_level: L1
  map_frame: map
  robot_frame: "{robot_name}/base_link"
  robot_namespace: "{robot_name}"
  nav2_action: navigate_to_pose
  battery_percent_topic: battery/percent
  emergency_topic: emergency
  follow_event_topic: internal/follow_event
  assume_full_battery_if_missing: true
  allow_blocked_retry: true
  nav2_server_timeout: 2.0
  goal_acceptance_timeout: 5.0
  state_publish_frequency: 10.0

robots:
  pinky1:
    robot_namespace: pinky1
    robot_frame: pinky1/base_link

  pinky2:
    robot_namespace: pinky2
    robot_frame: pinky2/base_link
